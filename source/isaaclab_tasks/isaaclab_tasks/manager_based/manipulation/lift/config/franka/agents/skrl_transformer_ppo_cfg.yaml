seed: 42


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: False
  policy:  # see gaussian_model parameters
    class: TransformerGaussian
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        # Embedding
        tokenization_method: all # all, single, bin, groups
        # Int: Number of bins to use for each part of the input when tokenization_method is bin
        num_bins: null # int
        # List of floats: For each dimentions of the input, specify its lower bound
        bin_start: [] # same length as input
        # List of floats: For each dimentions of the input, specify its upper bound
        bin_end: []
        # List of ints: For each dimension of the input, specify which group it is a part of. Only needed when tokenization_method is groups
        groups: []
        # Pooling transformer output: ['mean', 'max', 'CLS']
        pooling_method: mean
        
        # Learned model
        # zero adaln or normal adaln
        zero_out: False
        # null or 'adaptive'
        layer_norm_type: null
        # Only needed if using adaptive layer norm [4, 6]
        scale: 6

        # Using GRU Gate (Stabilizing Transformers for Reinforcement Learning)
        bias_g: 2.0 # only needed if using GRU gate
        gate: 'GRU' # numm or 'GRU'

        # Model parameters
        use_encoder: True
        use_decoder: False
        d_model: 64
        nhead: 4
        dim_feedforward: 256
        batch_first: True
        norm_first: True
        num_layers: 1
        # Action information
        # Int: The number of future actions to predict 
        num_pred_acts: 1
        # How to predict future actions. If 'action_tokens', use tokens to predict the number of actions above. Otherwise, no extra tokens are used.
        action_pred_type: null
        # Pretrained model (if desired)
        model_path: null
        use_text: False
        use_images: False
        
    output: ACTIONS
  value:  # see deterministic_model parameters
    class: TransformerDeterministic
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        # Embedding
        tokenization_method: all # all, single, bin, groups
        # Int: Number of bins to use for each part of the input when tokenization_method is bin
        num_bins: null # int
        # List of floats: For each dimentions of the input, specify its lower bound
        bin_start: [] # same length as input
        # List of floats: For each dimentions of the input, specify its upper bound
        bin_end: []
        # List of ints: For each dimension of the input, specify which group it is a part of. Only needed when tokenization_method is groups
        groups: []
        # Pooling transformer output: ['mean', 'max', 'CLS']
        pooling_method: mean
        
        # Learned model
        # zero adaln or normal adaln
        zero_out: False
        # null or 'adaptive'
        layer_norm_type: null
        # Only needed if using adaptive layer norm [4, 6]
        scale: 6

        # Using GRU Gate (Stabilizing Transformers for Reinforcement Learning)
        bias_g: 2.0 # only needed if using GRU gate
        gate: 'GRU' # numm or 'GRU'

        # Model parameters
        use_encoder: True
        use_decoder: False
        d_model: 64
        nhead: 4
        dim_feedforward: 256
        batch_first: True
        norm_first: True
        num_layers: 1
        # Pretrained model (if desired)
        model_path: null
        use_text: False
        use_images: False
    output: ONE
